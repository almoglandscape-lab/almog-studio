<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#16140f" />
  <title>Thank you — Almog Studio</title>
  <link rel="icon" type="image/png" href="../assets/symbol.png" />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&f[]=satoshi@300,400,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/style.css" />
  <style>
    .thanks{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;padding:40px 22px;background:var(--ink);color:var(--paper)}
    .thanks img{height:44px;width:auto;filter:invert(1) brightness(1.5);opacity:.9}
    .thanks h1{font-family:var(--display);font-weight:500;font-size:clamp(34px,6vw,64px);letter-spacing:-.02em;line-height:1}
    .thanks p{font-size:clamp(15px,1.4vw,18px);color:rgba(233,227,214,.7);max-width:34ch}
    .thanks a.back{display:inline-flex;align-items:center;gap:8px;margin-top:10px;font-family:var(--display);font-size:15px;color:var(--paper);border:1px solid rgba(233,227,214,.3);border-radius:999px;padding:11px 24px;transition:gap .25s var(--grow),background .25s}
    .thanks a.back:hover{gap:13px;background:rgba(255,255,255,.06)}
  </style>
</head>
<body>
  <main class="thanks">
    <img src="../assets/symbol.png" alt="" />
    <h1>Thank you.</h1>
    <p>Your message reached me. I read every one — I'll be in touch soon.</p>
    <a class="back" href="../">Back home <em style="font-style:normal">&rarr;</em></a>
  </main>
</body>
</html>
